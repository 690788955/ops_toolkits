id: demo.hello
name: 问候演示
description: 从 Shell 工具输出问候语
version: 1.0.0
category: demo
tags: [demo, shell]

help:
  usage: opsctl run tool demo.hello --set name=Tester --set message=Hello --no-prompt
  examples:
    - opsctl run tool demo.hello --set name=Tester --no-prompt

parameters:
  - name: name
    type: string
    description: 要问候的名称
    required: true
    default: World
  - name: message
    type: string
    description: 问候消息
    required: false
    default: Hello

execution:
  type: shell
  entry: bin/run.sh
  timeout: 1m
  workdir: .

pass_mode:
  env: true
  args: true
  param_file: true
  file_name: params.yaml

confirm:
  required: false
