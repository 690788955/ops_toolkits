id: demo.hello
name: 问候演示工作流
description: 以工作流方式运行问候演示工具
version: 1.0.0
category: demo
tags:
  - 演示
  - 工作流
  - 问候
parameters:
  - name: name
    type: string
    description: 要问候的名称
    required: true
    default: Workflow
nodes:
  - id: hello
    name: 输出问候
    tool: demo.hello
    depends_on: []
    params:
      message: 来自工作流的问候
      name: "123"
    optional: false
    timeout: ""
    confirm: false
    on_failure: stop
  - id: demo_hello_2
    name: 问候演示
    tool: demo.hello
    depends_on: []
    params:
      message: '{{ .steps.hello.params.name }}'
      name: '{{ .steps.hello.params.name }}'
    optional: false
    timeout: ""
    confirm: false
    on_failure: stop
edges:
  - from: hello
    to: demo_hello_2
steps: []
confirm:
  required: false
  message: ""
